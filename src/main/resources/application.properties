spring.application.name=server

# -----------------------------
# Server
# -----------------------------
server.port=9090
server.address=0.0.0.0

# -----------------------------
# Spring MVC / Static resources
# -----------------------------
spring.mvc.pathmatch.matching-strategy=ant_path_matcher
spring.web.resources.static-locations=classpath:/static/

# -----------------------------
# Datasource (MySQL)
# -----------------------------
#spring.datasource.url=jdbc:mysql://127.0.0.1:3306/server?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=123456
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------
# MyBatis
# -----------------------------
#mybatis.mapper-locations=classpath:mapper/*.xml
#mybatis.type-aliases-package=com.example.server.entity
#mybatis.configuration.map-underscore-to-camel-case=true
#mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# -----------------------------
# Redis (Spring Data Redis)
# -----------------------------
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.database=0
spring.data.redis.timeout=5000ms
spring.data.redis.lettuce.pool.max-active=16
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=3000ms

# -----------------------------
# Redisson (if using manual RedissonConfig)
# -----------------------------
redisson.address=redis://127.0.0.1:6379
redisson.password=
redisson.database=0

# -----------------------------
# MinIO
# -----------------------------
#minio.endpoint=http://127.0.0.1:9000
#minio.accessKey=minioadmin
#minio.secretKey=minioadmin
#minio.bucketName=media

# -----------------------------
# File upload
# -----------------------------
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# -----------------------------
# Thread pool (custom, for ThreadPoolConfig)
# -----------------------------
app.thread.corePoolSize=8
app.thread.maxPoolSize=16
app.thread.queueCapacity=200
app.thread.keepAliveSeconds=60
app.thread.threadNamePrefix=app-exec-

# -----------------------------
# AI / ASR / Third-party API
# (?????? utils/strategy ?????? key ????)
# -----------------------------
aliyun.accessKeyId=YOUR_ALIYUN_ACCESS_KEY_ID
aliyun.accessKeySecret=YOUR_ALIYUN_ACCESS_KEY_SECRET
aliyun.asr.appKey=YOUR_ASR_APP_KEY

ai.deepseek.api-key=sk-iwvgacxqaiezdiqsekdowcmjhwsftbperckcjtkmzlghnukc
ai.deepseek.base-url=https://api.siliconflow.cn/v1
ai.aliyun.api-key=sk-f6e51d42ad69494bb3c445895356b3ce

# -----------------------------
# yt-dlp / ffmpeg path (if YtDlpUtils uses local binary)
# -----------------------------
app.ytdlp.path=yt-dlp
app.ffmpeg.path=ffmpeg

# -----------------------------
# Logging
# -----------------------------
logging.level.root=INFO
logging.level.com.example.server=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%thread] %logger{36} - %msg%n

# -----------------------------
# Jackson
# -----------------------------
spring.jackson.time-zone=Asia/Shanghai
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.default-property-inclusion=non_null
